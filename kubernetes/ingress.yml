# ============================================================
# Ingress - Nginx with TLS termination and path-based routing
# Routes external traffic to internal data platform services
# ============================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: data-platform-ingress
  namespace: data-platform
  labels:
    app.kubernetes.io/part-of: data-platform
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - api.data-platform.internal
      secretName: data-platform-tls
  rules:
    - host: api.data-platform.internal
      http:
        paths:
          # Data API - main application
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: data-api-service
                port:
                  number: 8080

          # Health check endpoint (unauthenticated)
          - path: /health
            pathType: Exact
            backend:
              service:
                name: data-api-service
                port:
                  number: 8080

          # Metrics endpoint for Prometheus scraping
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: data-api-service
                port:
                  number: 9090
