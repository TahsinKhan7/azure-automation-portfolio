---
# ConfigMap - application settings (non-sensitive)
apiVersion: v1
kind: ConfigMap
metadata:
  name: data-api-config
  namespace: data-platform
  labels:
    app: data-api
data:
  ENVIRONMENT: "production"
  DATABRICKS_HOST: "https://adb-prod.azuredatabricks.net"
  ADF_FACTORY_NAME: "adf-prod-001"
  ADF_RESOURCE_GROUP: "rg-data-prod"
  LOG_LEVEL: "INFO"
  STORAGE_ACCOUNT: "stproddatalake001"
  STORAGE_CONTAINER: "gold"

---
# Azure Key Vault Secret Provider Class
# Injects secrets from Key Vault into pods via CSI driver
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-keyvault-data-api
  namespace: data-platform
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: ""  # Set to managed identity client ID
    keyvaultName: "kv-prod-001"
    tenantId: ""  # Set to Azure AD tenant ID
    objects: |
      array:
        - |
          objectName: databricks-token
          objectType: secret
        - |
          objectName: sql-connection-string
          objectType: secret
        - |
          objectName: storage-account-key
          objectType: secret
  secretObjects:
    - secretName: data-api-secrets
      type: Opaque
      data:
        - objectName: databricks-token
          key: databricks-token
        - objectName: sql-connection-string
          key: sql-connection-string
        - objectName: storage-account-key
          key: storage-account-key

---
# Service Account with Azure Workload Identity
apiVersion: v1
kind: ServiceAccount
metadata:
  name: data-api-sa
  namespace: data-platform
  annotations:
    azure.workload.identity/client-id: ""  # Set to managed identity client ID
  labels:
    azure.workload.identity/use: "true"
